# YOUSPEAK input configuration for Espanso
# https://espanso.org
#
# Install this file to your Espanso match directory:
#   macOS:   ~/Library/Application Support/espanso/match/youspeak.yml
#   Linux:   ~/.config/espanso/match/youspeak.yml
#   Windows: %APPDATA%\espanso\match\youspeak.yml
#
# Then restart Espanso (`espanso restart` on the command line).
#
# Usage:
#   Type a colon-prefixed canon word, e.g., ":doxakallos",
#   and Espanso substitutes the PUA-encoded glyph sequence.
#   Renders correctly only if a YOUSPEAK font is installed; otherwise
#   the glyph positions render as fallback boxes (recoverable via the
#   reverse transliterator).
#
#   To insert just a morpheme (e.g., just doxa, for custom compounds):
#     ":m:doxa" έΗΤ <doxa-glyph>
#
#   Canon-word triggers are bare-word after colon; morpheme triggers
#   use ":m:" prefix to avoid accidental substitution of common text.
#
# Compatibility:
#   Espanso runs as a user-space daemon on macOS, Linux, Windows. No
#   special system permissions beyond Accessibility on macOS (which
#   Espanso prompts for on first run).

matches:

  # ----- canon words (triggers: ":word") -----

  - trigger: ":doxakallos"
    replace: "ΌΕΑΌΕΒ"
  - trigger: ":kallodoxa"
    replace: "ΌΕΒΌΕΑ"
  - trigger: ":orthophanes"
    replace: "ΌΕΓΌΕΔ"
  - trigger: ":doxalgia"
    replace: "ΌΕΑΌΕΕ"
  - trigger: ":anagnoristasis"
    replace: "ΌΖΚΌΕΖΌΕΗ"
  - trigger: ":metastrophesis"
    replace: "ΌΕΘΌΕΙΌΖΒ"
  - trigger: ":athaumasma"
    replace: "ΌΖΑΌΕΚΌΖΖ"
  - trigger: ":synophora"
    replace: "ΌΕΛΌΕΜ"
  - trigger: ":kallophanes"
    replace: "ΌΕΒΌΕΔ"
  - trigger: ":dokimance"
    replace: "ΌΕΞΌΖΓ"
  - trigger: ":artiance"
    replace: "ΌΕΟΌΖΗ"
  - trigger: ":verisleight"
    replace: "ΌΕΠΌΕη"
  - trigger: ":candence"
    replace: "ΌΕΝΌΖΕ"
  - trigger: ":complerescence"
    replace: "ΌΖΜΌΕΡΌΖΘ"
  - trigger: ":diplosemy"
    replace: "ΌΕΣΌΕΤΌΖΝ"
  - trigger: ":veriseem"
    replace: "ΌΕΠΌΕθ"
  # ----- Core Canon (v2, post-Constitution 2026-04-24) -----
  - trigger: ":kimance"
    replace: "ΌΕξΌΖΔ"
  - trigger: ":kinqing"
    replace: "ΌΕπΌΕο"
  - trigger: ":tacitkin"
    replace: "ΌΕρΌΕπ"
  - trigger: ":mushinance"
    replace: "ΌΕσΌΖΓ"

  # ----- morphemes (triggers: ":m:morpheme") -----
  # For building compound words not yet in canon

  - trigger: ":m:doxa"
    replace: "ΌΕΑ"
  - trigger: ":m:kallos"
    replace: "ΌΕΒ"
  - trigger: ":m:ortho"
    replace: "ΌΕΓ"
  - trigger: ":m:phanes"
    replace: "ΌΕΔ"
  - trigger: ":m:algia"
    replace: "ΌΕΕ"
  - trigger: ":m:anagno"
    replace: "ΌΕΖ"
  - trigger: ":m:stasis"
    replace: "ΌΕΗ"
  - trigger: ":m:meta"
    replace: "ΌΕΘ"
  - trigger: ":m:strophe"
    replace: "ΌΕΙ"
  - trigger: ":m:thauma"
    replace: "ΌΕΚ"
  - trigger: ":m:syn"
    replace: "ΌΕΛ"
  - trigger: ":m:phora"
    replace: "ΌΕΜ"
  - trigger: ":m:cand"
    replace: "ΌΕΝ"
  - trigger: ":m:dokim"
    replace: "ΌΕΞ"
  - trigger: ":m:arti"
    replace: "ΌΕΟ"
  - trigger: ":m:veri"
    replace: "ΌΕΠ"
  - trigger: ":m:compler"
    replace: "ΌΕΡ"
  - trigger: ":m:diplos"
    replace: "ΌΕΣ"
  - trigger: ":m:sema"
    replace: "ΌΕΤ"
  - trigger: ":m:ki"
    replace: "ΌΕξ"
  - trigger: ":m:qing"
    replace: "ΌΕο"
  - trigger: ":m:kin"
    replace: "ΌΕπ"
  - trigger: ":m:tacit"
    replace: "ΌΕρ"
  - trigger: ":m:mushin"
    replace: "ΌΕσ"

  # ----- structural marks -----

  - trigger: ":ys:sep"       # compound-separator
    replace: "ΌΖι"
  - trigger: ":ys:ro"        # reading-annotation open
    replace: "ΌΖκ"
  - trigger: ":ys:rc"        # reading-annotation close
    replace: "ΌΖλ"
  - trigger: ":ys:pair"      # diplosemic-pair indicator
    replace: "ΌΖμ"
  - trigger: ":ys:canon"     # canon-mark
    replace: "ΌΖν"

  # ----- convenience utilities -----

  - trigger: ":ys:help"
    replace: |
      YOUSPEAK Input Quick Reference
      ------------------------------
      Canon words (type colon + word):
        :doxakallos :kallodoxa :orthophanes :doxalgia
        :anagnoristasis :metastrophesis :athaumasma :synophora
        :kallophanes :dokimance :artiance :verisleight :candence
        :complerescence :diplosemy :veriseem
      Morphemes (type :m:morpheme):
        :m:doxa :m:kallos :m:ortho :m:phanes :m:algia ...
      Structural:
        :ys:sep (compound separator)
        :ys:pair (diplosemic-pair arrow)
      Help:
        :ys:help (this reference)
