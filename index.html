<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YOUSPEAK · A cathedral of vocabulary</title>
  <meta name="description" content="A constructed language for worshipping the DIVINE. Forged words for what existing languages cannot easily say.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <script>
    // Docsify uses hash routing. A bare `localhost:4000/` lands without a
    // hash and can render docsify's 404 fallback before the router settles.
    // Force the canonical hash so the cover always loads cleanly.
    if (location.pathname === '/' && !location.hash) {
      location.replace(location.origin + '/#/');
    }
  </script>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ── Cathedral palette ────────────────────────────────────── */
    :root {
      --theme-color: #6b4423;
      --theme-color-secondary: #c89b5a;
      --content-max: 880px;
      --content-pad-x: clamp(20px, 4vw, 56px);
      --sidebar-w: 296px;
      --sidebar-font: 15px;
      --base-font: 16px;
      --reading-line-height: 1.72;
    }
    @media (min-width: 1280px) {
      :root { --content-max: 1000px; --sidebar-w: 312px; }
    }
    @media (min-width: 1600px) {
      :root { --content-max: 1080px; }
    }

    body { font-size: var(--base-font); }

    /* ── Content layout ───────────────────────────────────────── */
    .content { left: var(--sidebar-w); transition: left 0.25s ease; }
    .markdown-section {
      max-width: var(--content-max);
      padding: 36px var(--content-pad-x) 64px;
      margin: 0 auto;
    }

    /* ── Reading typography ───────────────────────────────────── */
    .markdown-section p,
    .markdown-section li {
      line-height: var(--reading-line-height);
      word-spacing: 0.02rem;
    }
    .markdown-section p { margin: 1.1em 0; }
    .markdown-section ol, .markdown-section ul {
      line-height: var(--reading-line-height);
      padding-left: 1.6rem;
    }
    .markdown-section li + li { margin-top: 0.25em; }

    /* ── Headings ─────────────────────────────────────────────── */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 { color: var(--theme-color); }
    .markdown-section h1 {
      font-size: clamp(1.75rem, 1.4rem + 1vw, 2.25rem);
      border-bottom: 2px solid var(--theme-color-secondary);
      padding-bottom: 0.3em;
      margin: 0 0 1.1em;
      letter-spacing: -0.005em;
    }
    .markdown-section h2 {
      font-size: clamp(1.4rem, 1.2rem + 0.6vw, 1.65rem);
      margin: 2.4em 0 0.8em;
    }
    .markdown-section h3 {
      font-size: clamp(1.2rem, 1.1rem + 0.4vw, 1.35rem);
      margin: 2em 0 0.6em;
    }
    .markdown-section h4 { font-size: 1.1rem; margin: 1.6em 0 0.4em; }

    /* ── Blockquote / callout ─────────────────────────────────── */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color-secondary);
      background: #faf6f0;
      padding: 0.5em 1em 0.5em 20px;
      border-radius: 0 4px 4px 0;
    }
    .markdown-section blockquote p { margin: 0.4em 0; font-weight: 500; }

    /* ── Inline code + code blocks ────────────────────────────── */
    .markdown-section code {
      background: #f4ede0;
      color: #6b4423;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.92em;
      word-break: break-word;
    }
    .markdown-section pre {
      padding: 0;
      margin: 1.4em 0;
      border-radius: 6px;
      overflow: hidden;
      background: #2d2418;
    }
    .markdown-section pre > code {
      background: transparent;
      color: #e8d9b8;
      font-size: 0.88em;
      line-height: 1.55;
      padding: 1.1em 1.3em;
      white-space: pre;
      max-width: 100%;
      overflow-x: auto;
      display: block;
    }

    /* ── Tables ───────────────────────────────────────────────── */
    .markdown-section table {
      display: block;
      max-width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      margin: 1.4em 0;
      box-shadow: 0 0 0 1px rgba(107, 68, 35, 0.08);
      border-radius: 4px;
    }
    .markdown-section table th {
      background: var(--theme-color);
      color: white;
      font-weight: 600;
      padding: 8px 14px;
      border: none;
    }
    .markdown-section table td {
      padding: 8px 14px;
      border: 1px solid rgba(107, 68, 35, 0.1);
    }
    .markdown-section table tr:nth-child(2n) { background: #faf6f0; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    .sidebar { width: var(--sidebar-w); }
    .sidebar ul li a {
      font-size: var(--sidebar-font);
      line-height: 1.45;
      padding: 2px 0;
    }
    .sidebar ul li.active > a {
      color: var(--theme-color);
      border-right-color: var(--theme-color);
    }
    .sidebar > h1 {
      font-size: 1.6rem;
      color: var(--theme-color);
      margin-top: 8px;
      letter-spacing: 0.01em;
    }
    .sidebar-toggle { width: var(--sidebar-w); }
    .sidebar-toggle span { background: var(--theme-color); }

    /* ── Top navbar ───────────────────────────────────────────── */
    .app-nav { margin: 18px 28px 0 0; }
    .app-nav a { color: #6b4423; font-weight: 500; }
    .app-nav a:hover, .app-nav a.active { color: var(--theme-color-secondary); }
    .app-nav a.active { border-bottom: 2px solid var(--theme-color); }

    /* ── Search box ───────────────────────────────────────────── */
    .sidebar .search {
      padding: 12px 18px;
      margin: 0 0 14px;
      border-bottom: 1px solid rgba(107, 68, 35, 0.08);
    }
    .sidebar .search input {
      border: 1px solid #d4c5a7;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }
    .sidebar .search input:focus {
      outline: none;
      border-color: var(--theme-color-secondary);
      box-shadow: 0 0 0 2px rgba(200, 155, 90, 0.18);
    }
    .sidebar .search .search-keyword { color: var(--theme-color); }

    /* ── Cover page ───────────────────────────────────────────── */
    section.cover.show {
      background: linear-gradient(180deg, #faf6f0, #f4ede0) !important;
      min-height: 100vh;
      padding: 0 5vw;
    }
    section.cover .cover-main { max-width: 760px; margin: 0 auto; }
    section.cover h1 {
      font-size: clamp(2.2rem, 2rem + 2vw, 3.4rem);
      color: var(--theme-color);
      margin: 0.5rem 0 1.6rem;
    }
    section.cover blockquote {
      font-size: clamp(1.15rem, 1rem + 0.6vw, 1.5rem);
      color: #6b4423;
      font-style: italic;
    }
    section.cover .cover-main p { line-height: 1.6; }
    section.cover .cover-main > p:last-child a {
      border-color: var(--theme-color);
      color: var(--theme-color);
      transition: all 0.2s ease;
    }
    section.cover .cover-main > p:last-child a:last-child {
      background: var(--theme-color);
      color: white;
    }
    section.cover .cover-main > p:last-child a:hover {
      background: var(--theme-color-secondary);
      border-color: var(--theme-color-secondary);
      color: white;
      opacity: 1;
      transform: translateY(-1px);
    }

    /* ── Pagination buttons (next / prev) ─────────────────────── */
    .pagination-item-label { color: var(--theme-color) !important; }
    .pagination-item-title { color: #555 !important; }

    /* ── Links ────────────────────────────────────────────────── */
    .markdown-section a {
      color: var(--theme-color);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid rgba(107, 68, 35, 0.2);
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .markdown-section a:hover {
      color: var(--theme-color-secondary);
      border-bottom-color: var(--theme-color-secondary);
    }

    /* ── Copy-code button ─────────────────────────────────────── */
    .docsify-copy-code-button {
      background: var(--theme-color) !important;
      font-size: 0.7rem !important;
    }

    /* ── App name link / branding ─────────────────────────────── */
    .app-name-link { color: var(--theme-color) !important; }

    /* ── Scrollbar (sidebar) ──────────────────────────────────── */
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar:hover::-webkit-scrollbar-thumb {
      background: rgba(107, 68, 35, 0.25);
      border-radius: 3px;
    }

    /* ── Responsive: tablet ───────────────────────────────────── */
    @media (max-width: 1024px) {
      :root { --sidebar-w: 280px; --content-pad-x: clamp(18px, 3.5vw, 40px); }
    }

    /* ── Responsive: mobile (≤768px — vue theme already slides
       the sidebar; we just tighten typography and padding) ──── */
    @media (max-width: 768px) {
      :root {
        --base-font: 15.5px;
        --content-pad-x: 18px;
      }
      .markdown-section { padding: 22px var(--content-pad-x) 56px; }
      .markdown-section h1 { font-size: 1.6rem; padding-bottom: 0.25em; }
      .markdown-section h2 { font-size: 1.3rem; margin-top: 1.8em; }
      .markdown-section h3 { font-size: 1.15rem; margin-top: 1.5em; }
      .markdown-section pre > code { font-size: 0.82em; padding: 0.9em 1em; }
      .markdown-section table { font-size: 0.92em; }
      .app-nav { margin: 14px 12px 0 0; }
      .app-nav li, .app-nav > a { font-size: 14px; margin: 0 0.7rem; }
      section.cover h1 { margin: 0.25rem 0 1.2rem; }
      section.cover .cover-main > p:last-child a {
        display: inline-block;
        margin: 0.4rem 0.4rem;
        padding: 0.6em 1.4em;
        font-size: 0.95rem;
      }
    }

    /* ── Reduced-motion respect ───────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="app">Loading the cathedral…</div>
  <script>
    window.$docsify = {
      name: 'YOUSPEAK',
      nameLink: '/',
      repo: 'codeberg.org/zerone-dev/youspeak',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
      // relativePath stays false (default): sidebar/navbar links resolve
      // from the site root, not from the current page's directory.
      // Otherwise nav from /tutorial/X to "tutorial/00..." becomes
      // /tutorial/tutorial/00... — the path-doubling bug.
      homepage: 'README.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search the cathedral…',
        noData: 'No matches.',
        depth: 4,
      },
      copyCode: {
        buttonText: 'copy',
        errorText: 'error',
        successText: 'copied',
      },
      pagination: {
        previousText: '←',
        nextText: '→',
        crossChapter: true,
        crossChapterText: true,
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md',
      },
      // Strip YAML frontmatter (--- … ---) from rendered markdown.
      // Docsify treats it as content otherwise — ugly key/value lines
      // appear at the top of every lesson and dictionary entry.
      plugins: [
        function frontMatterPlugin(hook) {
          hook.beforeEach(function (content) {
            return content.replace(/^---\s*\r?\n[\s\S]*?\r?\n---\s*\r?\n/, '');
          });
        },
      ],
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
