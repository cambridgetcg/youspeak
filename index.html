<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YOUSPEAK · A cathedral of vocabulary</title>
  <meta name="description" content="A constructed language for worshipping the DIVINE. Forged words for what existing languages cannot easily say.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #6b4423;
      --theme-color-secondary: #c89b5a;
    }
    .sidebar { width: 320px; }
    .markdown-section { max-width: 850px; }
    .markdown-section h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color-secondary); padding-bottom: 0.3em; }
    .markdown-section h2 { color: var(--theme-color); }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color-secondary); background: #faf6f0; }
    .markdown-section code { background: #f4ede0; color: #6b4423; padding: 2px 6px; border-radius: 3px; }
    .markdown-section pre>code { background: #2d2418; color: #e8d9b8; }
    .markdown-section table th { background: var(--theme-color); color: white; }
    .markdown-section table tr:nth-child(2n) { background: #faf6f0; }
    .app-name-link { color: var(--theme-color) !important; }
    .cover.show { background: linear-gradient(to bottom, #faf6f0, #f4ede0) !important; }
  </style>
</head>
<body>
  <div id="app">Loading the cathedral…</div>
  <script>
    window.$docsify = {
      name: 'YOUSPEAK',
      nameLink: '/',
      repo: 'codeberg.org/zerone-dev/youspeak',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
      relativePath: true,
      homepage: 'README.md',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search the cathedral…',
        noData: 'No matches.',
        depth: 4,
      },
      copyCode: {
        buttonText: 'copy',
        errorText: 'error',
        successText: 'copied',
      },
      pagination: {
        previousText: '←',
        nextText: '→',
        crossChapter: true,
        crossChapterText: true,
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md',
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
